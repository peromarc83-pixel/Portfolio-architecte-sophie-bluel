<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Sophie Bluel - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">             
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Work+Sans:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">   
    <script src="login.js" defer></script>
</head>
<body>

    <!-- HEADER -->
    <header>
	<h1>Sophie Bluel <span>ARCHITECTE D'INTERIEUR</span></h1>
	<nav>
		<ul>
			<li>projets</li>
			<li>contact</li>
			<li>login</li>
			<li><img src="./assets/icons/instagram.png" alt="Instagram"></li>
		</ul>
	</nav>
</header>

    <!-- MAIN -->
    <main>
        <section class="login">
            <h2>Log In</h2>

            <div class="login-form">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" name="password" autocomplete="current-password">
                </div>

                <button class="btn-login" type="button">Se connecter</button>

                <a href="#" class="forgot-password">Mot de passe oublié</a>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <a href="#">Mentions légales</a>
    </footer>

</body>
</html>
